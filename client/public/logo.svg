<svg width="240" height="80" viewBox="0 0 240 80" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Prof. Roxanna Ezenekwe</title>
<desc>Logo for Prof. Roxanna Ezenekwe — Educator, Author, Entrepreneur</desc>

<!-- Circular emblem -->
<circle cx="36" cy="40" r="30" stroke="#C9A96E" fill="none" stroke-width="1.2"/>
<circle cx="36" cy="40" r="23" stroke="#C9A96E" fill="none" stroke-width="0.6" stroke-dasharray="3 2"/>

<!-- Graduation cap -->
<polygon points="36,18 52,25 36,32 20,25" fill="#C9A96E"/>
<line x1="36" y1="32" x2="36" y2="43" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round"/>
<line x1="49" y1="25" x2="49" y2="36" stroke="#C9A96E" stroke-width="1.2" stroke-linecap="round"/>
<circle cx="49" cy="38" r="2" fill="#C9A96E"/>

<!-- Open book -->
<path d="M22,47 Q36,43 36,47 Q36,43 50,47 L50,60 Q36,57 36,60 Q36,57 22,60 Z" fill="#C9A96E"/>
<line x1="36" y1="43" x2="36" y2="60" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
<line x1="25" y1="51" x2="34" y2="50" stroke="white" stroke-width="0.6" stroke-linecap="round"/>
<line x1="25" y1="54" x2="34" y2="53" stroke="white" stroke-width="0.6" stroke-linecap="round"/>
<line x1="38" y1="50" x2="47" y2="51" stroke="white" stroke-width="0.6" stroke-linecap="round"/>
<line x1="38" y1="53" x2="47" y2="54" stroke="white" stroke-width="0.6" stroke-linecap="round"/>

<!-- Vertical divider -->
<line x1="74" y1="12" x2="74" y2="68" stroke="#C9A96E" stroke-width="0.8"/>

<!-- PROF label -->
<text x="82" y="26" font-family="Georgia, serif" font-size="7" letter-spacing="3" fill="#C9A96E">PROF.</text>

<!-- Main name — dark charcoal, visible on white and light gray -->
<text x="80" y="48" font-family="Georgia, serif" font-size="20" fill="#1a1a1a" font-weight="700" letter-spacing="0.5">Roxanna</text>

<!-- Last name -->
<text x="81" y="60" font-family="Georgia, serif" font-size="9" fill="#C9A96E" letter-spacing="2.5">EZENEKWE</text>

<!-- Divider line -->
<line x1="81" y1="65" x2="238" y2="65" stroke="#C9A96E" stroke-width="0.5"/>

<!-- Tagline -->
<text x="81" y="74" font-family="Georgia, serif" font-size="5.5" letter-spacing="2" fill="#888888">EDUCATOR · AUTHOR · ENTREPRENEUR</text>

</svg>